services:
  api:
    build:
      context: ./backend/WkApi
    container_name: wk-api
    depends_on:
      - db
    expose:
      - "8080"
    # Same port as `dotnet run` (vite.config proxy → localhost:5122) so you can use
    # `docker compose up db api` + `npm run dev` and hit the container cache/DB.
    ports:
      - "5122:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=wkdb;Username=wkuser;Password=wkpassword
    volumes:
      # Future Matches file cache (created on first write; not in git). Inspect: docker volume inspect … ; docker exec -it wk-api ls /app/Apps/FutureMatches/Cache
      - future_matches_cache:/app/Apps/FutureMatches/Cache

  db:
    image: postgres:16
    container_name: wk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wkdb
      POSTGRES_USER: wkuser
      POSTGRES_PASSWORD: wkpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: ./frontend/wk-frontend
    container_name: wk-web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  future_matches_cache: